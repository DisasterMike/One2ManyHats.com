<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="/favicon.ico"/>
    <script src="javascript/home/banner.js"></script>
    <script src="javascript/core/navbar.js"></script>
    <script src="/javascript/home/language-toggle.js"></script>
    <script src="common/index.js"></script>
    <title>Home</title>
    {{fonts}}
</head>
<body>
    {{navbar}}

    <!-- Banner Section -->
     {{language-toggle}}
    <div class="banner">
        <div class="flex-box f-justify-end d-flex-column" style="height: 100%;">
            <div class="flex-box f-justify-center f-align-center d-flex-column" style="flex-grow: 1; padding-top: 100px">
                <div class="banner-logo">
                    {{home-banner}}
                </div>
            </div>
            <div class="scroll-down-arrow flex-box f-justify-center" style="position: relative;">
                <a href="#about"><i class="fa-solid fa-angle-down"></i></a>
            </div>
            <div id="about" class="home-marquee-container">
                <div class="home-marquee-text">
                    <div class="flex-box" style="gap: 100px; padding-bottom: 16px;">
                        {{marquee-names}}
                    </div>
                </div>
            </div>
        </div>
    </div>  

    <!-- Profile Section REMOVE THE HEIGHT!! -->
    <!-- removed id=about to marquee bit -->
    <div style="background: var(--grey-back); padding: 65px 0;">

        <div class="about-row flex-box f-justify-center">
            <div class="about-image-box flex-box f-align-center f-justify-end">
                <div class="about-img">
                    <div class="img-box show" data-hobby-info-toggle-target="webPic" style="background-image: url('/images/pictures/MeDemoDay1.jpg'); background-position: center; background-size: cover;"></div>
                    <div class="img-box" data-hobby-info-toggle-target="gamesPic" style="background-image: url('/images/pictures/me.jpg'); background-position: center; background-size: cover;"></div>
                    <div class="img-box" data-hobby-info-toggle-target="boardPic" style="background-image: url('/images/pictures/MeAtLeWagon.jpg'); background-position: center; background-size: cover;"></div>
                </div>
                <div class="about-img-back"></div>
            </div>
            <div class="about-info box-shadow flex-box">
                <div class="text-box flex-box">
                    <div class="text-box-info">
                    <div class="flex-box d-flex-column f-align-center" style="text-align: center;">
                        <h2><strong>Michael Stump</strong></h2>
                        <h5>[[LOCALIZE: job-titles]]</h5>
                    </div>
                    <p>
                        [[LOCALIZE: about-box-text]]
                    </p>
                    </div>
                    <div class="social-icons flex-box f-justify-center d-none">
                        <a href="https://www.linkedin.com/in/michael-a-stump/" target="_blank">
                            <i class="fa-brands fa-linkedin"></i>
                        </a>
                        <a href="https://github.com/DisasterMike" target="_blank">
                            <i class="fa-brands fa-github"></i>
                        </a>
                        <a href="https://store.steampowered.com/developer/one2manyhats" target="_blank">
                            <i class="fa-brands fa-steam"></i>
                        </a>
                        <!-- add a itch.io one!!?? -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Contact Section -->
    <div id="contact" style="background: var(--grey-back);"></div>

    <!-- Footer Section REMOVE THE HEIGHT!! -->
    {{footer}}
    
    <script>
        // remove the home nav icon when on the home page
        const homeNavIcon = document.querySelector('.nav-home')
        homeNavIcon.remove()
    </script>
</body>
</html>
